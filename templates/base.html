<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Sargis Artashyan | Portfolio{% endblock %}</title>
    <style>
        :root { --primary-color: #2c3e50; --accent-color: #3498db; --bg-light: #f4f7f6; }
        body { font-family: 'Inter', sans-serif; background: var(--bg-light); color: var(--primary-color); padding: 40px; }
        .container { max-width: 900px; margin: 0 auto; }
        .card { background: #fff; padding: 2rem; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .tag-list { display: flex; flex-wrap: wrap; gap: 8px; padding: 0; }
    </style>
</head>
<body>
    <main class="container">
        {% block content %}{% endblock %}
    </main>
</body>
</html>
